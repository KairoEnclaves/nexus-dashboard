<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="nx" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2ef2e0"/>
      <stop offset="0.55" stop-color="#33e0ff"/>
      <stop offset="1" stop-color="#ff4d8d"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0" stop-color="#0a1620"/>
      <stop offset="1" stop-color="#03060a"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded dark tile -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#bg)" stroke="#2ef2e0" stroke-opacity="0.25"/>

  <!-- neon hex frame -->
  <polygon points="16,3.2 27,9.4 27,22.6 16,28.8 5,22.6 5,9.4"
    fill="none" stroke="url(#nx)" stroke-width="1.4" stroke-linejoin="round" opacity="0.85"/>

  <!-- corner accent ticks -->
  <g stroke="#2ef2e0" stroke-width="1" opacity="0.55" stroke-linecap="round">
    <line x1="5" y1="9.4" x2="8" y2="11.1"/>
    <line x1="27" y1="9.4" x2="24" y2="11.1"/>
    <line x1="5" y1="22.6" x2="8" y2="20.9"/>
    <line x1="27" y1="22.6" x2="24" y2="20.9"/>
  </g>

  <!-- glowing X monogram (NEXUS accent) -->
  <g filter="url(#glow)" stroke="url(#nx)" stroke-width="2.6" stroke-linecap="round">
    <line x1="11" y1="10.5" x2="21" y2="21.5"/>
    <line x1="21" y1="10.5" x2="11" y2="21.5"/>
  </g>

  <!-- node dots -->
  <circle cx="16" cy="3.2" r="1.3" fill="#2ef2e0"/>
  <circle cx="16" cy="28.8" r="1.3" fill="#ff4d8d"/>
</svg>
