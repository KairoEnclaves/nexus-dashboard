<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#03060a"/>

  <!-- Outer hex ring -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
    fill="none" stroke="#2ef2e0" stroke-width="1.2" opacity="0.6"/>

  <!-- Inner hex -->
  <polygon points="16,6 24.5,11 24.5,21 16,26 7.5,21 7.5,11"
    fill="#060d12" stroke="#2ef2e0" stroke-width="0.6" opacity="0.4"/>

  <!-- Corner accent cuts -->
  <line x1="4" y1="9" x2="7.5" y2="11" stroke="#2ef2e0" stroke-width="1" opacity="0.9"/>
  <line x1="28" y1="9" x2="24.5" y2="11" stroke="#2ef2e0" stroke-width="1" opacity="0.9"/>
  <line x1="4" y1="23" x2="7.5" y2="21" stroke="#2ef2e0" stroke-width="1" opacity="0.9"/>
  <line x1="28" y1="23" x2="24.5" y2="21" stroke="#2ef2e0" stroke-width="1" opacity="0.9"/>

  <!-- N letterform -->
  <text x="16" y="21.5"
    font-family="'Courier New', monospace"
    font-size="14"
    font-weight="bold"
    fill="#2ef2e0"
    text-anchor="middle"
    letter-spacing="-1">N</text>

  <!-- Glow dot top -->
  <circle cx="16" cy="2" r="1.2" fill="#2ef2e0"/>
  <circle cx="16" cy="30" r="1.2" fill="#2ef2e0"/>
</svg>
