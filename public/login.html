<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <title>NEXUS // access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    /* ===== Biometric HUD scan overlay ===== */
    .scan-overlay{
      position:fixed; inset:0; z-index:50; display:none;
      align-items:center; justify-content:center;
      background:rgba(3,6,10,0.82); backdrop-filter:blur(6px);
      opacity:0; transition:opacity .35s ease;
    }
    .scan-overlay.on{ display:flex; opacity:1; }
    .scan-frame{
      position:relative; width:min(360px,86vw); padding:30px 26px 24px;
      text-align:center; color:var(--cyan);
      border:1px solid rgba(46,242,224,0.22); border-radius:16px;
      background:rgba(6,16,20,0.5);
      box-shadow:0 0 40px rgba(46,242,224,0.12), inset 0 0 30px rgba(46,242,224,0.05);
    }
    .scan-frame .cnr{ position:absolute; width:16px; height:16px; border:2px solid var(--cyan); opacity:.8; }
    .scan-frame .tl{ top:-1px; left:-1px; border-right:0; border-bottom:0; }
    .scan-frame .tr{ top:-1px; right:-1px; border-left:0; border-bottom:0; }
    .scan-frame .bl{ bottom:-1px; left:-1px; border-right:0; border-top:0; }
    .scan-frame .br{ bottom:-1px; right:-1px; border-left:0; border-top:0; }

    .scan-reticle{ position:relative; width:188px; height:188px; margin:4px auto 18px; color:var(--cyan); }
    .scan-reticle svg{ position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
    .ring-outer{ transform-origin:100px 100px; animation:spin 7s linear infinite; }
    .ring-mid{ transform-origin:100px 100px; animation:spin 5s linear infinite reverse; }
    .fp path{ opacity:.85; }
    .core{ animation:pulse 1.4s ease-in-out infinite; transform-origin:100px 100px; }

    .scan-sweep{ position:absolute; inset:0; border-radius:50%;
      -webkit-clip-path:circle(46% at 50% 50%); clip-path:circle(46% at 50% 50%); overflow:hidden; }
    .scan-sweep::before{
      content:""; position:absolute; left:0; right:0; height:38%;
      background:linear-gradient(to bottom, transparent, rgba(46,242,224,0.28), rgba(46,242,224,0.5));
      box-shadow:0 0 14px rgba(46,242,224,0.5); top:-40%;
      animation:sweep 1.7s cubic-bezier(.5,0,.5,1) infinite;
    }
    .scan-sweep::after{
      content:""; position:absolute; left:0; right:0; height:2px; top:0;
      background:var(--cyan); box-shadow:0 0 10px 2px rgba(46,242,224,0.8);
      animation:sweepline 1.7s cubic-bezier(.5,0,.5,1) infinite;
    }

    .scan-status{ font-family:var(--font-disp); font-size:13px; letter-spacing:3px;
      color:var(--cyan); text-shadow:0 0 12px rgba(46,242,224,0.5); min-height:18px; text-transform:uppercase; }
    .scan-sub{ font-family:var(--font-mono); font-size:10px; letter-spacing:2px; color:var(--text-faint); margin-top:8px; }
    .scan-bar{ height:4px; margin:14px auto 0; width:80%; border-radius:4px; overflow:hidden;
      background:rgba(46,242,224,0.1); border:1px solid rgba(46,242,224,0.2); }
    .scan-bar i{ display:block; height:100%; width:0%;
      background:linear-gradient(90deg, rgba(46,242,224,0.5), var(--cyan)); transition:width .5s ease; box-shadow:0 0 10px var(--cyan); }

    /* success / fail states */
    .scan-frame.ok{ color:var(--green); border-color:rgba(87,240,138,.5); box-shadow:0 0 50px rgba(87,240,138,.3); }
    .scan-frame.ok .scan-status{ color:var(--green); text-shadow:0 0 14px rgba(87,240,138,.7); }
    .scan-frame.ok .scan-sweep::before, .scan-frame.ok .scan-sweep::after{ animation:none; opacity:0; }
    .scan-frame.ok .ring-outer, .scan-frame.ok .ring-mid{ animation-duration:1.4s; }
    .scan-frame.fail{ color:var(--red); border-color:rgba(255,90,110,.6); animation:shake .4s linear 2; }
    .scan-frame.fail .scan-status{ color:var(--red); text-shadow:0 0 14px rgba(255,90,110,.7); }
    .scan-frame.fail .scan-sweep::before, .scan-frame.fail .scan-sweep::after{ animation:none; opacity:0; }
    .scan-frame.fail .core{ animation:none; }

    /* warp-to-dashboard transition */
    .warp-flash{ position:fixed; inset:0; z-index:60; background:var(--cyan); opacity:0; pointer-events:none; }
    body.warp .scan-overlay{ animation:warpzoom .7s ease-in forwards; }
    body.warp .warp-flash{ animation:flash .7s ease-in forwards; }

    @keyframes spin{ to{ transform:rotate(360deg); } }
    @keyframes pulse{ 0%,100%{ opacity:.5; transform:scale(1);} 50%{ opacity:1; transform:scale(1.18);} }
    @keyframes sweep{ 0%{ top:-40%;} 100%{ top:100%;} }
    @keyframes sweepline{ 0%{ top:0;} 100%{ top:100%;} }
    @keyframes shake{ 0%,100%{ transform:translateX(0);} 25%{ transform:translateX(-7px);} 75%{ transform:translateX(7px);} }
    @keyframes warpzoom{ to{ transform:scale(1.6); opacity:0; filter:brightness(2.2); } }
    @keyframes flash{ 0%{ opacity:0;} 55%{ opacity:.85;} 100%{ opacity:0;} }
    /* ===== Digital lock-pick (progresses as you type) ===== */
    .lockpick{ margin:4px 0 14px; }
    .lp-rail{ position:relative; height:46px; display:flex; align-items:flex-end; justify-content:center; gap:5px; padding:0 4px; }
    .lp-shear{ position:absolute; left:6px; right:6px; top:19px; border-top:1px dashed rgba(46,242,224,0.35); pointer-events:none; }
    .pin{ position:relative; width:8px; height:42px; border-radius:4px; background:rgba(46,242,224,0.05); border:1px solid rgba(46,242,224,0.12); overflow:hidden; }
    .pin .seg{ position:absolute; left:1px; right:1px; top:2px; height:13px; border-radius:3px;
      background:rgba(255,90,110,0.45); transition:top .26s cubic-bezier(.34,1.7,.5,1), background .2s, box-shadow .2s; }
    .pin.set .seg{ top:17px; background:var(--cyan); box-shadow:0 0 8px rgba(46,242,224,0.85); }
    .lp-meta{ display:flex; justify-content:space-between; font-family:var(--font-mono); font-size:10px; letter-spacing:2px; color:var(--text-faint); margin-top:8px; }
    .lp-meta .lbl.armed{ color:var(--green); }
    .lp-count{ color:var(--cyan-dim); }

    /* ===== Lock-cylinder button ===== */
    .lockbtn{ width:100%; margin-top:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
      padding:13px; border-radius:8px; border:1px solid rgba(46,242,224,0.28);
      background:linear-gradient(180deg, rgba(46,242,224,0.07), rgba(46,242,224,0.02));
      color:var(--cyan-dim); font-family:var(--font-disp); letter-spacing:3px; font-size:13px; text-transform:uppercase; transition:all .25s; }
    .lockbtn svg{ width:20px; height:20px; flex:none; }
    .lockbtn .shackle{ transition:transform .35s cubic-bezier(.34,1.6,.5,1); transform-box:fill-box; transform-origin:82% 92%; }
    .lockbtn.armed{ color:#eafdfd; border-color:var(--cyan);
      background:linear-gradient(180deg, rgba(46,242,224,0.24), rgba(46,242,224,0.07));
      box-shadow:0 0 18px rgba(46,242,224,0.35); animation:lockpulse 1.6s ease-in-out infinite; }
    .lockbtn.armed .shackle{ transform:translateY(-3px) rotate(-22deg); }
    .lockbtn:active{ transform:translateY(1px); }
    @keyframes lockpulse{ 0%,100%{ box-shadow:0 0 13px rgba(46,242,224,0.26);} 50%{ box-shadow:0 0 26px rgba(46,242,224,0.55);} }

    @media (prefers-reduced-motion: reduce){
      .ring-outer,.ring-mid,.core,.scan-sweep::before,.scan-sweep::after,.lockbtn.armed{ animation:none !important; }
      .pin .seg,.lockbtn .shackle{ transition:none !important; }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="login-wrap">
    <form class="login-card" id="loginForm" autocomplete="off">
      <div class="brand">NEXUS<small>PERSONAL COMMAND DECK</small></div>
      <h2>// AUTHENTICATION REQUIRED</h2>
      <div class="field">
        <label>Operator ID</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label>Passphrase</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <div class="lockpick">
        <div class="lp-rail" id="pins"><div class="lp-shear"></div></div>
        <div class="lp-meta"><span class="lbl" id="pickLbl">CYLINDER LOCKED</span><span class="lp-count" id="pickCount">0 / 12</span></div>
      </div>
      <button class="lockbtn" id="authBtn" type="submit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="4" y="10.5" width="16" height="10.5" rx="2.5" fill="rgba(46,242,224,0.08)"/>
          <path class="shackle" d="M8,10.5 V7.5 a4,4 0 0 1 8,0 V10.5"/>
          <circle cx="12" cy="15.2" r="1.4" fill="currentColor" stroke="none"/>
          <line x1="12" y1="15.2" x2="12" y2="18"/>
        </svg>
        <span id="btnTxt">CYLINDER LOCKED</span>
      </button>
      <div class="login-err" id="err"></div>
      <div class="login-foot">
        SECURE SESSION · BCRYPT · HTTP-ONLY COOKIE<br />
        UNAUTHORIZED ACCESS IS LOGGED <span class="blink">_</span>
      </div>
    </form>
  </div>

  <!-- Biometric scan overlay -->
  <div class="scan-overlay" id="scan" aria-hidden="true">
    <div class="scan-frame" id="scanFrame">
      <span class="cnr tl"></span><span class="cnr tr"></span><span class="cnr bl"></span><span class="cnr br"></span>
      <div class="scan-reticle">
        <svg viewBox="0 0 200 200" fill="none" stroke="currentColor">
          <circle class="ring-outer" cx="100" cy="100" r="92" stroke-width="1.5" stroke-dasharray="6 10" opacity="0.7"/>
          <circle class="ring-mid" cx="100" cy="100" r="76" stroke-width="2" stroke-dasharray="40 22" opacity="0.85"/>
          <g stroke-width="2" stroke-linecap="round" opacity="0.8">
            <line x1="100" y1="6" x2="100" y2="20"/><line x1="100" y1="180" x2="100" y2="194"/>
            <line x1="6" y1="100" x2="20" y2="100"/><line x1="180" y1="100" x2="194" y2="100"/>
          </g>
          <g class="fp" stroke-width="2" stroke-linecap="round">
            <path d="M76,106 a24,26 0 0 1 48,0"/>
            <path d="M68,112 a32,34 0 0 0 64,0"/>
            <path d="M84,99 a16,18 0 0 1 32,1"/>
            <path d="M90,114 a10,12 0 0 0 20,-2"/>
            <path d="M62,100 a38,40 0 0 1 14,-24"/>
            <path d="M138,100 a38,40 0 0 0 -14,-24"/>
          </g>
          <circle class="core" cx="100" cy="100" r="5" fill="currentColor" stroke="none"/>
        </svg>
        <div class="scan-sweep"></div>
      </div>
      <div class="scan-status" id="scanStatus">INITIATING SCAN</div>
      <div class="scan-bar"><i id="scanBar"></i></div>
      <div class="scan-sub" id="scanSub">hold still — do not look away from the sensor</div>
    </div>
  </div>
  <div class="warp-flash"></div>

  <script src="/assets/js/visuals.js"></script>
  <script>
    NexusVisuals.particleField(document.getElementById('bg-canvas'));

    // ----- digital lock-pick: tumblers set as you type -----
    (function () {
      const TOTAL = 12;
      const rail = document.getElementById('pins');
      const pickLbl = document.getElementById('pickLbl');
      const pickCount = document.getElementById('pickCount');
      const authBtn = document.getElementById('authBtn');
      const btnTxt = document.getElementById('btnTxt');
      const emailI = document.getElementById('email');
      const passI = document.getElementById('password');
      const emailRe = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
      const pins = [];
      for (let i = 0; i < TOTAL; i++) {
        const p = document.createElement('div');
        p.className = 'pin';
        p.innerHTML = '<span class="seg"></span>';
        rail.appendChild(p);
        pins.push(p);
      }
      function update() {
        const email = emailI.value.trim(), pass = passI.value;
        const emailOk = emailRe.test(email);
        const emailPart = emailOk ? 1 : Math.min(email.length / 10, 0.55);
        const passPart = Math.min(pass.length / 8, 1);
        const set = Math.round((0.5 * emailPart + 0.5 * passPart) * TOTAL);
        pins.forEach((p, i) => p.classList.toggle('set', i < set));
        pickCount.textContent = set + ' / ' + TOTAL;
        const armed = emailOk && pass.length >= 4;
        authBtn.classList.toggle('armed', armed);
        pickLbl.textContent = armed ? 'CYLINDER PICKED' : 'CYLINDER LOCKED';
        pickLbl.classList.toggle('armed', armed);
        btnTxt.textContent = armed ? 'DISENGAGE LOCK ▸' : 'CYLINDER LOCKED';
      }
      emailI.addEventListener('input', update);
      passI.addEventListener('input', update);
      update();
    })();

    const form = document.getElementById('loginForm');
    const err = document.getElementById('err');
    const scan = document.getElementById('scan');
    const frame = document.getElementById('scanFrame');
    const statusEl = document.getElementById('scanStatus');
    const subEl = document.getElementById('scanSub');
    const bar = document.getElementById('scanBar');

    const wait = (ms) => new Promise((r) => setTimeout(r, ms));
    const STEPS = [
      [0,    'INITIATING BIOMETRIC SCAN', 12],
      [550,  'READING RETINAL SIGNATURE', 38],
      [1050, 'MATCHING OPERATOR PROFILE', 64],
      [1500, 'DECRYPTING SESSION KEY',    86],
    ];
    let timers = [];
    function startScan() {
      err.textContent = '';
      frame.classList.remove('ok', 'fail');
      statusEl.textContent = STEPS[0][1];
      subEl.textContent = 'hold still — do not look away from the sensor';
      bar.style.width = '0%';
      scan.classList.add('on');
      timers = STEPS.map(([t, msg, pct]) => setTimeout(() => { statusEl.textContent = msg; bar.style.width = pct + '%'; }, t));
    }
    function clearTimers() { timers.forEach(clearTimeout); timers = []; }

    async function scanSuccess() {
      clearTimers();
      bar.style.width = '100%';
      frame.classList.add('ok');
      statusEl.textContent = 'IDENTITY VERIFIED';
      subEl.textContent = 'access granted — establishing uplink';
      await wait(700);
      document.body.classList.add('warp');
      await wait(620);
      location.href = '/';
    }
    async function scanFail(message) {
      clearTimers();
      frame.classList.add('fail');
      statusEl.textContent = 'IDENTITY REJECTED';
      subEl.textContent = message || 'credentials not recognised';
      await wait(1300);
      scan.classList.remove('on');
      err.textContent = '>_ ' + (message || 'Access denied');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      startScan();
      const minTime = wait(1950);
      let data;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        data = await r.json();
      } catch (_) {
        data = { ok: false, error: 'Connection error' };
      }
      await minTime;
      if (data.ok) scanSuccess(); else scanFail(data.error);
    });
  </script>
</body>
</html>
